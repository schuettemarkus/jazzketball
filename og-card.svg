<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0B0E1A"/>
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#D4A843" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#D4A843" opacity="0.6"/>

  <!-- Vault icon — safe door with dial and hinges -->
  <g transform="translate(556, 90)">
    <rect x="6" y="6" width="76" height="76" rx="8" stroke="#D4A843" stroke-width="4" fill="none" opacity="0.85"/>
    <rect x="14" y="14" width="60" height="60" rx="4" stroke="#D4A843" stroke-width="2.5" fill="none" opacity="0.3"/>
    <!-- Hinges -->
    <rect x="-2" y="20" width="10" height="8" rx="2" fill="#D4A843" opacity="0.4"/>
    <rect x="-2" y="36" width="10" height="8" rx="2" fill="#D4A843" opacity="0.4"/>
    <rect x="-2" y="52" width="10" height="8" rx="2" fill="#D4A843" opacity="0.4"/>
    <!-- Center dial -->
    <circle cx="50" cy="44" r="14" stroke="#D4A843" stroke-width="3" fill="none" opacity="0.8"/>
    <circle cx="50" cy="44" r="6" stroke="#D4A843" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Spokes -->
    <line x1="50" y1="30" x2="50" y2="20" stroke="#D4A843" stroke-width="2.5" opacity="0.5"/>
    <line x1="50" y1="58" x2="50" y2="68" stroke="#D4A843" stroke-width="2.5" opacity="0.5"/>
    <line x1="36" y1="44" x2="26" y2="44" stroke="#D4A843" stroke-width="2.5" opacity="0.5"/>
    <line x1="64" y1="44" x2="74" y2="44" stroke="#D4A843" stroke-width="2.5" opacity="0.5"/>
    <!-- Diagonal spokes -->
    <line x1="40.1" y1="34.1" x2="33" y2="27" stroke="#D4A843" stroke-width="2" opacity="0.35"/>
    <line x1="59.9" y1="34.1" x2="67" y2="27" stroke="#D4A843" stroke-width="2" opacity="0.35"/>
    <line x1="40.1" y1="53.9" x2="33" y2="61" stroke="#D4A843" stroke-width="2" opacity="0.35"/>
    <line x1="59.9" y1="53.9" x2="67" y2="61" stroke="#D4A843" stroke-width="2" opacity="0.35"/>
  </g>

  <text x="600" y="215" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#D4A843" letter-spacing="8" opacity="0.8">NBA VAULT</text>

  <text x="600" y="290" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" fill="white">Real Lines. Real Edges.</text>
  <text x="600" y="350" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#D4A843">Public Track Record.</text>

  <text x="600" y="400" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#888888">NBA player prop picks with edge calculations from DraftKings &amp; FanDuel lines</text>

  <!-- Stats bar -->
  <g transform="translate(250, 440)">
    <rect x="0" y="0" width="700" height="70" rx="12" fill="#111428" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
    <rect x="0" y="0" width="700" height="70" rx="12" fill="#D4A843" opacity="0.04"/>
    <text x="120" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="#22c55e">FREE</text>
    <text x="120" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#888">Pick of the Day</text>
    <line x1="233" y1="15" x2="233" y2="55" stroke="#333" stroke-width="1"/>
    <text x="350" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="#D4A843">EDGE %</text>
    <text x="350" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#888">Every pick calculated</text>
    <line x1="466" y1="15" x2="466" y2="55" stroke="#333" stroke-width="1"/>
    <text x="583" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="white">VERIFIED</text>
    <text x="583" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#888">Every result public</text>
  </g>

  <text x="600" y="570" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#D4A843" opacity="0.6">nbavault.com/picks</text>

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0B0E1A"/>
      <stop offset="50%" stop-color="#111428"/>
      <stop offset="100%" stop-color="#0B0E1A"/>
    </linearGradient>
  </defs>
</svg>
