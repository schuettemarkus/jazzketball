  { team: 'IND Pacers', record: '34-48', odds: 1.0, need: 'Haliburton complement' },
  { team: 'ATL Hawks', record: '35-47', odds: 0.5, need: 'Trae Young help' },
];

// Simulate lottery using weighted random selection
function simulateLottery() {
  const teams = LOTTERY_TEAMS.map(t => ({ ...t }));
  const lotteryResult = [];

  // Top 4 picks determined by lottery balls
  for (let pick = 0; pick < 4; pick++) {
    const totalOdds = teams.reduce((s, t) => s + t.odds, 0);
    let rand = Math.random() * totalOdds;
    let selected = teams[0];
    for (const t of teams) {
      rand -= t.odds;
      if (rand <= 0) { selected = t; break; }
    }
    lotteryResult.push({ ...selected, pick: pick + 1 });
    const idx = teams.findIndex(t => t.team === selected.team);
    teams.splice(idx, 1);
  }

  // Picks 5-14 go in reverse-record order
  teams.forEach((t, i) => {
    lotteryResult.push({ ...t, pick: 5 + i });
  });

  return lotteryResult;
}

// Hot/Cold Streak
function StreakDots({ streak }) {
  const [hovIdx, setHovIdx] = useState(null);
  const colors = { hot: '#22c55e', cold: '#ef4444', avg: '#eab308' };
  return (
    <div className="flex gap-1.5 items-center relative">
      {streak.map((g, i) => (
        <div key={i} className="relative">
          <div
            className="w-4 h-4 rounded-full cursor-pointer transition-transform hover:scale-150"
            style={{ background: colors[g.result] }}
            onMouseEnter={() => setHovIdx(i)}
            onMouseLeave={() => setHovIdx(null)}
          />
          {hovIdx === i && (
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs whitespace-nowrap z-50 shadow-lg">
              <div className="font-bold">vs {g.opp}</div>
              <div>{g.pts} pts, {g.reb} reb{g.ast ? `, ${g.ast} ast` : ''}</div>
              <div className={g.win ? 'text-green-400' : 'text-red-400'}>{g.win ? 'W' : 'L'}</div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// Radar Chart for Players
function PlayerRadar({ data, size = 280 }) {
  const chartData = Object.entries(data).map(([key, val]) => ({ subject: key, value: val, fullMark: 100 }));
  return (
    <ResponsiveContainer width="100%" height={size}>
      <RadarChart data={chartData}>
        <PolarGrid stroke="rgba(78,0,142,0.5)" />
        <PolarAngleAxis dataKey="subject" tick={{ fill: '#ccc', fontSize: 11 }} />
        <PolarRadiusAxis domain={[0, 100]} tick={false} axisLine={false} />
        <Radar dataKey="value" stroke="#79A3DC" fill="#79A3DC" fillOpacity={0.3} strokeWidth={2} />
      </RadarChart>
    </ResponsiveContainer>
  );
}

function RosterSection() {
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const starters = PLAYERS.filter(p => p.starter);
  const bench = PLAYERS.filter(p => !p.starter);

  const pctChange = (curr, prev) => {
    if (!prev || prev === 0) return null;
    return Math.round(((curr - prev) / prev) * 100);
  };

  const StatWithDelta = ({ val, label, prev }) => {
    const delta = prev != null ? pctChange(val, prev) : null;
    return (
      <span className="inline-flex items-center gap-0.5">
        {val} {label}
        {delta !== null && (
          <span className={`text-[9px] font-bold ${delta > 0 ? 'text-green-400' : delta < 0 ? 'text-red-400' : 'text-gray-500'}`}>

// ============================================================

// US state boundaries as simplified SVG path data for an Albers projection
// We use a simple lat/lng → pixel projection for the US bounding box
const US_BOUNDS = { minLat: 24.5, maxLat: 49.5, minLng: -125, maxLng: -66.5 };
const WORLD_BOUNDS = { minLat: -60, maxLat: 72, minLng: -180, maxLng: 180 };

function projectPoint(lat, lng, bounds, width, height) {
  const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * width;
  const y = ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat)) * height;
  return { x, y };
}

function isInUS(lat, lng) {
  return lat >= US_BOUNDS.minLat && lat <= US_BOUNDS.maxLat &&
         lng >= US_BOUNDS.minLng && lng <= US_BOUNDS.maxLng;
}

// Reverse geocode — show state only for US, country for international
async function reverseGeocode(lat, lng) {
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=5`);
    const data = await resp.json();
    const state = data.address?.state || '';
    const country = data.address?.country_code?.toUpperCase() || '??';
    const label = country === 'US' && state ? state : (data.address?.country || 'Unknown');
    return { city: label, country };
  } catch {
    return { city: 'Unknown', country: '??' };
  }
}

const STORAGE_KEY = 'jazzketball_fanmap_visitors';

function loadVisitors() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveVisitors(visitors) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(visitors)); } catch {}
}

function FanMap() {
  const [visitors, setVisitors] = useState(() => loadVisitors());
  const [userLoc, setUserLoc] = useState(null);
  const [hovCity, setHovCity] = useState(null);
  const [geoStatus, setGeoStatus] = useState('pending');
  const [isNewVisit, setIsNewVisit] = useState(false);

  const hasIntl = visitors.some(v => !isInUS(v.lat, v.lng));
  const mapBounds = hasIntl ? WORLD_BOUNDS : US_BOUNDS;
  const mapWidth = 800;
  const mapHeight = hasIntl ? 500 : 500;

  useEffect(() => {
    if (!navigator.geolocation) { setGeoStatus('denied'); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = Math.round(pos.coords.latitude * 10) / 10;
        const lng = Math.round(pos.coords.longitude * 10) / 10;
        setUserLoc({ lat, lng });
        setGeoStatus('granted');

        const geo = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);

        setVisitors(prev => {
          const existing = prev.find(v => Math.abs(v.lat - lat) < 0.2 && Math.abs(v.lng - lng) < 0.2);
          let updated;
          if (existing) {
            updated = prev.map(v => v === existing ? { ...v, count: v.count + 1, lastVisit: new Date().toISOString() } : v);
          } else {
            setIsNewVisit(true);
            updated = [...prev, { lat, lng, city: geo.city, country: geo.country, count: 1, lastVisit: new Date().toISOString() }];
          }
          saveVisitors(updated);
          return updated;
        });
      },
      () => setGeoStatus('denied')
    );
  }, []);

  const totalVisits = visitors.reduce((s, v) => s + v.count, 0);
  const uniqueLocations = visitors.length;
  const top5 = [...visitors].sort((a, b) => b.count - a.count).slice(0, 5);
  const flags = { US: '🇺🇸', GB: '🇬🇧', JP: '🇯🇵', AU: '🇦🇺', FR: '🇫🇷', CA: '🇨🇦', MX: '🇲🇽', SG: '🇸🇬', DE: '🇩🇪', BR: '🇧🇷', '??': '🌍' };

  // Recognizable US continental outline (simplified but accurate shape)
  // Coordinates mapped to 800x500 SVG viewBox using US_BOUNDS projection
  const usOutline = useMemo(() => {
    // Key coastal/border points of the continental US, projected
    const pts = [
      // Pacific NW
      [-124.7, 48.4], [-124.2, 46.3], [-123.9, 46.2], [-124.1, 43.5], [-124.4, 42.0],

const POLL_STORAGE_KEY = 'jazzketball_poll_data';
const POLL_ANSWERED_KEY = 'jazzketball_poll_answered';
const POLL_ORDER_KEY = 'jazzketball_poll_order';

function loadPollData() {
  try { return JSON.parse(localStorage.getItem(POLL_STORAGE_KEY)) || {}; } catch { return {}; }
}
function savePollData(data) {
  try { localStorage.setItem(POLL_STORAGE_KEY, JSON.stringify(data)); } catch {}
}
function loadAnswered() {
  try { return JSON.parse(localStorage.getItem(POLL_ANSWERED_KEY)) || {}; } catch { return {}; }
}
function saveAnswered(data) {
  try { localStorage.setItem(POLL_ANSWERED_KEY, JSON.stringify(data)); } catch {}
}
function getShuffledOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem(POLL_ORDER_KEY));
    if (saved && saved.length === ALL_POLL_QUESTIONS.length) return saved;
  } catch {}
  const order = ALL_POLL_QUESTIONS.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [order[i], order[j]] = [order[j], order[i]]; }
  try { localStorage.setItem(POLL_ORDER_KEY, JSON.stringify(order)); } catch {}
  return order;
}

const POLL_COLORS = ['#79A3DC', '#4E008E', '#7B2FBF', '#A8C4E8', '#8B5CF6', '#EC4899', '#10B981', '#F59E0B'];

function FanPoll() {
  const [pollData, setPollData] = useState(() => loadPollData());
  const [answered, setAnswered] = useState(() => loadAnswered());
  const [order] = useState(() => getShuffledOrder());
  const [showDashboard, setShowDashboard] = useState(false);

  // Find first unanswered question in this user's shuffled order
  const currentIdx = order.findIndex(i => !answered[ALL_POLL_QUESTIONS[i].id]);
  const currentQ = currentIdx >= 0 ? ALL_POLL_QUESTIONS[order[currentIdx]] : null;
  const answeredCount = Object.keys(answered).length;
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [selectedQId, setSelectedQId] = useState(null);

  const vote = (qId, optIdx) => {
    if (answered[qId]) return;
    setSelectedAnswer(optIdx);
    setSelectedQId(qId);

    const key = `q${qId}`;
    const newData = { ...pollData };
    if (!newData[key]) newData[key] = {};
    newData[key][optIdx] = (newData[key][optIdx] || 0) + 1;
    setPollData(newData);
    savePollData(newData);

    const newAnswered = { ...answered, [qId]: optIdx };
    setAnswered(newAnswered);
    saveAnswered(newAnswered);
  };

  const goNext = () => {
    setSelectedAnswer(null);
    setSelectedQId(null);
  };

  const getQData = (qId) => {
    const key = `q${qId}`;
    return pollData[key] || {};
  };

  const getTotalVotes = (qId) => {
    const d = getQData(qId);
    return Object.values(d).reduce((s, v) => s + v, 0);
  };

  // Category stats for dashboard
  const cats = ['Draft', 'Roster', 'Team', 'Trade', 'Culture'];
  const catCounts = {};
  cats.forEach(c => { catCounts[c] = ALL_POLL_QUESTIONS.filter(q => q.cat === c && answered[q.id] !== undefined).length; });
  const catTotals = {};
  cats.forEach(c => { catTotals[c] = ALL_POLL_QUESTIONS.filter(q => q.cat === c).length; });

  // Most voted questions
  const mostVoted = ALL_POLL_QUESTIONS
    .map(q => ({ ...q, total: getTotalVotes(q.id) }))
    .filter(q => q.total > 0)
    .sort((a, b) => b.total - a.total)
    .slice(0, 5);

  return (
    <section className="py-12 px-4 max-w-5xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-jazz-sky">FAN</span> POLL
      </h2>

      {/* Progress bar */}
      <div className="max-w-md mx-auto mb-2">
        <div className="flex justify-between text-xs text-gray-400 mb-1">
          <span>{answeredCount} of {ALL_POLL_QUESTIONS.length} answered</span>
          <span>{Math.round((answeredCount / ALL_POLL_QUESTIONS.length) * 100)}%</span>
        </div>
        <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
          <div className="h-full bg-jazz-sky rounded-full transition-all duration-500" style={{ width: `${(answeredCount / ALL_POLL_QUESTIONS.length) * 100}%` }} />
        </div>
      </div>

      {/* Toggle */}
      <div className="flex justify-center gap-3 mb-8">
        <button onClick={() => setShowDashboard(false)}

            <p className="text-gray-400">You've answered all 50 questions. Check the Dashboard for results!</p>

              View Dashboard
            </button>
          </div>
        )
      ) : (
        /* DASHBOARD VIEW — community results analysis */
        <div className="space-y-8 animate-fade-in">
          {/* Overview stats */}
          <div className="grid grid-cols-3 gap-4">
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-jazz-sky">
                {ALL_POLL_QUESTIONS.reduce((s, q) => s + getTotalVotes(q.id), 0)}
              </div>
              <div className="text-xs text-gray-400">Total Community Votes</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-jazz-sky">
                {ALL_POLL_QUESTIONS.filter(q => getTotalVotes(q.id) > 0).length}
              </div>
              <div className="text-xs text-gray-400">Questions With Votes</div>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <div className="text-3xl font-black text-jazz-sky">{answeredCount}/50</div>
              <div className="text-xs text-gray-400">Your Progress</div>
            </div>
          </div>

          {/* Community consensus — top winning answers by category */}
          {cats.map(cat => {
            const catQs = ALL_POLL_QUESTIONS.filter(q => q.cat === cat && getTotalVotes(q.id) > 0);
            if (catQs.length === 0) return null;
            return (
              <div key={cat} className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-jazz-sky mb-1">{cat}</h3>
                <p className="text-xs text-gray-500 mb-4">{catQs.length} question{catQs.length !== 1 ? 's' : ''} voted on</p>
                <div className="space-y-4">
                  {catQs.map(q => {
                    const data = getQData(q.id);
                    const total = getTotalVotes(q.id);
                    const sorted = q.opts.map((opt, i) => ({ opt, votes: data[i] || 0, i })).sort((a, b) => b.votes - a.votes);
                    const winner = sorted[0];
                    const winPct = total > 0 ? Math.round((winner.votes / total) * 100) : 0;
                    return (
                      <div key={q.id} className="glass rounded-xl p-4">
                        <div className="flex items-start justify-between mb-3">
                          <h4 className="font-semibold text-sm flex-1 text-gray-200">{q.q}</h4>
                          <span className="text-xs text-gray-500 ml-2 whitespace-nowrap">{total} votes</span>
                        </div>
                        {/* Winner highlight */}
                        <div className="flex items-center gap-2 mb-3">
                          <span className="text-jazz-sky font-bold">{winner.opt}</span>
                          <span className="text-jazz-sky font-black text-lg">{winPct}%</span>
                          {winPct >= 60 && <span className="text-xs px-2 py-0.5 rounded-full bg-jazz-sky/20 text-jazz-sky">Strong consensus</span>}
                          {winPct >= 40 && winPct < 60 && <span className="text-xs px-2 py-0.5 rounded-full bg-jazz-purple/30 text-jazz-light">Split vote</span>}
                        </div>
                        {/* All options as bars */}
                        <div className="space-y-1.5">
                          {sorted.map((s, si) => {
                            const pct = total > 0 ? Math.round((s.votes / total) * 100) : 0;
                            return (
                              <div key={si} className="flex items-center gap-2">
                                <div className="text-xs text-gray-400 w-28 truncate">{s.opt}</div>
                                <div className="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                                  <div className="h-full rounded-full transition-all duration-500" style={{
                                    width: `${pct}%`,
                                    background: si === 0 ? '#79A3DC' : si === 1 ? '#4E008E' : '#7B2FBF'
                                  }} />
                                </div>
                                <span className="text-xs text-gray-500 w-10 text-right">{pct}%</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {/* Votes by category chart */}
          {(() => {
            const chartData = cats.map(c => ({
              name: c,
              votes: ALL_POLL_QUESTIONS.filter(q => q.cat === c).reduce((s, q) => s + getTotalVotes(q.id), 0)
            })).filter(d => d.votes > 0);
            return chartData.length > 0 && (
              <div className="glass rounded-2xl p-6">
                <h3 className="text-lg font-bold text-jazz-sky mb-4">Votes by Category</h3>
                <div style={{ height: 250 }}>
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={chartData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(78,0,142,0.2)" />
                      <XAxis dataKey="name" tick={{ fill: '#aaa', fontSize: 11 }} />
                      <YAxis tick={{ fill: '#aaa', fontSize: 11 }} />
                      <Tooltip contentStyle={{ background: '#0A0014', border: '1px solid #4E008E', borderRadius: 8 }} />
                      <Bar dataKey="votes" fill="#79A3DC" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            );
          })()}

          <div className="text-center">
            <button onClick={() => setShowDashboard(false)} className="px-6 py-2 rounded-xl glass text-jazz-sky hover:bg-jazz-sky/20 font-semibold">
              {answeredCount < ALL_POLL_QUESTIONS.length ? 'Keep Voting' : 'Review Questions'}
            </button>
          </div>
        </div>
      )}
    </section>
  );
}

function LineupBuilder() {
  const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
  const [lineup, setLineup] = useState({ PG: null, SG: null, SF: null, PF: null, C: null });
  const [report, setReport] = useState(null);

  const assignPlayer = (player) => {
    const posOptions = player.pos.split('/');
    for (const pos of posOptions) {
      if (lineup[pos] === null) {
        setLineup(prev => ({ ...prev, [pos]: player }));
        return;
      }
    }
    // Try any empty slot
    for (const pos of positions) {
      if (!lineup[pos]) {
        setLineup(prev => ({ ...prev, [pos]: player }));
        return;
      }
    }
  };

  const filledCount = Object.values(lineup).filter(Boolean).length;
  const usedNames = new Set(Object.values(lineup).filter(Boolean).map(p => p.name));

  useEffect(() => {
    if (filledCount === 5) {
      const players = Object.values(lineup).filter(Boolean);
      const totalPPG = players.reduce((s, p) => s + p.stats.ppg, 0).toFixed(1);
      const totalRPG = players.reduce((s, p) => s + p.stats.rpg, 0).toFixed(1);
      const hasJJJ = players.some(p => p.name.includes('Jackson'));
      const hasKessler = players.some(p => p.name.includes('Kessler'));
      const hasMarkkanen = players.some(p => p.name.includes('Markkanen'));
      const hasGeorge = players.some(p => p.name.includes('George'));
      const avgDef = players.reduce((s, p) => s + p.radar.Defense, 0) / 5;

      let identity = 'Balanced';
      let chemistry = 7;
      const strengths = [];

      if (hasMarkkanen && players.some(p => p.radar.Shooting > 70)) {
        identity = 'Stretch Offense'; chemistry += 1;
      }
      if (hasGeorge) { identity = 'Guard-Driven'; strengths.push('Elite playmaking from Keyonte George drives the offense'); }
      if (hasJJJ && hasKessler) { strengths.push('Elite defensive frontcourt — DPOY meets shot-blocking menace'); chemistry += 1; }
      if (hasJJJ && hasMarkkanen) { strengths.push('Twin stretch-big spacing warps every defensive scheme'); identity = 'Inside-Out'; }
      if (avgDef > 70) { strengths.push('Top-tier defensive unit — opponents score at a below-average rate'); chemistry += 1; }
      if (strengths.length === 0) strengths.push('Versatile lineup with multiple scoring options');

      chemistry = Math.min(chemistry, 10);

      setReport({
        ppg: totalPPG, rpg: totalRPG, chemistry, identity,
        defRating: (105 - avgDef * 0.15).toFixed(1), strengths
      });
    } else {
      setReport(null);
    }
  }, [lineup, filledCount]);

  return (
    <section className="py-12 px-4 max-w-5xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-jazz-sky">LINEUP</span> BUILDER
      </h2>
      <p className="text-center text-gray-400 mb-6">Build your dream Jazz lineup</p>

      {/* Position Slots */}
      <div className="flex justify-center gap-3 mb-8 flex-wrap">
        {positions.map(pos => (
          <div key={pos} className={`glass rounded-xl p-4 w-32 text-center transition-all ${lineup[pos] ? 'border-jazz-sky/50' : 'border-dashed border-2 border-jazz-purple/50'}`}>
            <div className="text-xs text-jazz-sky font-bold mb-2">{pos}</div>
            {lineup[pos] ? (
              <div>
                <JerseyAvatar number={lineup[pos].number} size={48} />
                <div className="text-xs font-semibold mt-1 truncate">{lineup[pos].name.split(' ').pop()}</div>
              </div>
            ) : (
              <div className="text-3xl text-gray-600">+</div>
            )}
          </div>
        ))}
      </div>

      {/* Available Players */}
      <div className="flex flex-wrap gap-2 justify-center mb-6">
        {PLAYERS.map(p => (
          <button key={p.name} onClick={() => assignPlayer(p)}
            disabled={usedNames.has(p.name)}
            className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${usedNames.has(p.name) ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'glass text-white hover:bg-jazz-sky/20 hover:text-jazz-sky'}`}>
            #{p.number} {p.name.split(' ').pop()}
          </button>
        ))}
      </div>

      <div className="flex justify-center gap-3">
        <button onClick={() => setLineup({ PG: null, SG: null, SF: null, PF: null, C: null })}
          className="px-4 py-2 rounded-full glass text-gray-400 hover:text-white text-sm">Reset</button>
      </div>

      {/* Report */}
      {report && (
        <div className="mt-8 glass rounded-2xl p-6 animate-fade-in">
          <h3 className="text-lg font-bold text-jazz-sky text-center mb-4">Lineup Report</h3>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div className="text-center">
              <div className="text-2xl font-black text-jazz-sky">{report.ppg}</div>
              <div className="text-xs text-gray-400">Projected PPG</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-black text-jazz-sky">{report.rpg}</div>
              <div className="text-xs text-gray-400">Projected RPG</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-black text-jazz-sky">{report.chemistry}/10</div>
              <div className="text-xs text-gray-400">Chemistry</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-black text-jazz-sky">{report.defRating}</div>
              <div className="text-xs text-gray-400">Def. Rating</div>
            </div>
          </div>
          <div className="text-center mb-4">
            <span className="px-4 py-1 rounded-full bg-jazz-sky/20 text-jazz-sky font-bold text-sm">{report.identity}</span>
          </div>
          <div className="space-y-2">
            {report.strengths.map((s, i) => (
              <div key={i} className="flex items-start gap-2 text-sm"><span className="text-green-400">&#10003;</span><span className="text-gray-300">{s}</span></div>
            ))}
          </div>
        </div>
      )}
    </section>
  );
}

// SECTION: TRADE MACHINE
// ============================================================
function TradeMachine() {
  const [jazzOut, setJazzOut] = useState([]);
  const [incoming, setIncoming] = useState('');
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);

  const toggleJazzPlayer = (name) => {
    setJazzOut(prev => prev.includes(name) ? prev.filter(n => n !== name) : prev.length < 2 ? [...prev, name] : prev);
  };

  const analyzeTrade = async () => {
    if (!jazzOut.length || !incoming.trim()) return;
    setLoading(true);
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': prompt('Enter your Anthropic API key:'), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000,
          system: "You are an NBA trade analyst. Evaluate trades for the Utah Jazz. Current core: Keyonte George (PG), Ace Bailey (SG, rookie), Lauri Markkanen (SF, All-Star), Jaren Jackson Jr (PF, DPOY), Walker Kessler (C). Be specific and analytical. Format: Start with a letter grade (A+ to F), then 3 bullet points for the trade, then 3 bullet points against. End with a Danny Ainge Approval rating (1-10).",
          messages: [{ role: 'user', content: `Jazz trade away: ${jazzOut.join(', ')}. Jazz receive: ${incoming}. Analyze this trade.` }]
        })
      });
      const data = await resp.json();
      setAnalysis(data.content?.[0]?.text || 'Could not analyze trade.');
    } catch (e) {
      setAnalysis('Trade analysis requires an Anthropic API key. Enter a valid key to unlock AI-powered analysis.');
    }
    setLoading(false);
  };

  return (
    <section className="py-12 px-4 max-w-4xl mx-auto">
      <h2 className="text-3xl font-black text-center mb-2">
        <span className="text-jazz-sky">TRADE</span> MACHINE
      </h2>
      <p className="text-center text-gray-400 mb-6">What if? Simulate trades with AI analysis</p>

      <div className="glass rounded-2xl p-6">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          {/* Jazz sends */}
          <div>
            <h3 className="text-sm font-bold text-red-400 mb-3">JAZZ SEND (select 1-2)</h3>
            <div className="space-y-2">
              {PLAYERS.map(p => (
                <button key={p.name} onClick={() => toggleJazzPlayer(p.name)}
                  className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all ${jazzOut.includes(p.name) ? 'bg-red-600/20 border border-red-500/50 text-red-300' : 'glass text-gray-300 hover:text-white'}`}>
                  #{p.number} {p.name} <span className="text-gray-500">({p.pos})</span>
                </button>
              ))}
            </div>
          </div>
          {/* Jazz receives */}
          <div>
            <h3 className="text-sm font-bold text-green-400 mb-3">JAZZ RECEIVE</h3>
            <textarea value={incoming} onChange={e => setIncoming(e.target.value)}
              placeholder="Type player names (e.g., 'Zach LaVine, 2027 1st round pick')"
              className="w-full h-32 bg-gray-900/50 border border-jazz-purple rounded-xl p-3 text-sm text-white placeholder-gray-500 resize-none focus:outline-none focus:border-jazz-sky" />
            <button onClick={analyzeTrade} disabled={loading || !jazzOut.length || !incoming.trim()}
              className="mt-3 w-full py-3 rounded-xl font-bold text-sm transition-all bg-jazz-sky text-black hover:bg-yellow-400 disabled:opacity-40 disabled:cursor-not-allowed">
              {loading ? 'Analyzing...' : '🔄 Analyze Trade'}
            </button>
          </div>
        </div>

        {analysis && (
          <div className="mt-6 glass rounded-xl p-4 animate-fade-in">
            <h3 className="text-sm font-bold text-jazz-sky mb-3">AI TRADE ANALYSIS</h3>
            <div className="text-sm text-gray-300 leading-relaxed space-y-2"
              dangerouslySetInnerHTML={{ __html: analysis
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-jazz-sky font-semibold">$1</strong>')
                .replace(/\n\n/g, '</p><p class="mt-2">')
                .replace(/\n- /g, '<br/>\u2022 ')
                .replace(/\n/g, '<br/>')
              }} />
          </div>
        )}
      </div>
    </section>
  );
}

// SECTION: DRAFT SIMULATOR (lottery odds-based)
// ============================================================
function DraftSimulator() {
  const [simState, setSimState] = useState('idle');
  const [lotteryOrder, setLotteryOrder] = useState([]);
  const [picks, setPicks] = useState([]);
  const [available, setAvailable] = useState([...PROSPECTS]);
  const [jazzOptions, setJazzOptions] = useState([]);
  const [jazzPickNum, setJazzPickNum] = useState(7);
  const [userPick, setUserPick] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [fanReactions, setFanReactions] = useState([]);

  const startSim = () => {
    const lottery = simulateLottery();
    const jazzSlot = lottery.findIndex(t => t.team === 'UTAH JAZZ');
    const jazzPick = jazzSlot + 1;

    setLotteryOrder(lottery);
    setJazzPickNum(jazzPick);
    setSimState('lottery');
    setPicks([]);
    setAvailable([...PROSPECTS]);
    setUserPick(null);
    setFanReactions([]);

    // Show lottery results for 3s then start picks
    setTimeout(() => {
      setSimState('simulating');
      simulatePicks([...PROSPECTS], [], 1, lottery, jazzPick);
    }, 3000);
  };

  const simulatePicks = (avail, currentPicks, pickNum, lottery, jazzPick) => {
    if (pickNum >= jazzPick) {
      const top3 = avail.slice(0, 3);
      setJazzOptions(top3);
      setAvailable(avail);
      setPicks(currentPicks);
      setSimState('picking');
      return;
    }

    setTimeout(() => {
      const team = lottery[pickNum - 1];
      // Add some randomness to team picks — sometimes they don't take BPA
      let pickIdx = 0;
      if (Math.random() < 0.25 && avail.length > 2) {
        // 25% chance team reaches for a need-based pick (take #2 or #3 instead of #1)
        pickIdx = Math.floor(Math.random() * Math.min(3, avail.length));
      }
      const picked = avail[pickIdx];
      const newAvail = [...avail]; newAvail.splice(pickIdx, 1);
      const newPicks = [...currentPicks, { ...team, player: picked }];
      setPicks(newPicks);
      setAvailable(newAvail);
      simulatePicks(newAvail, newPicks, pickNum + 1, lottery, jazzPick);
    }, 700);
  };

  const makeJazzPick = (prospect) => {
    setUserPick(prospect);
    setShowConfetti(true);
    setSimState('done');
    const reactions = [
      { user: '@JazzFanForever', text: `${prospect.name}?! LET'S GOOOOO! This is the one! 🔥🔥🔥` },
      { user: '@UtahHoops2026', text: `Interesting pick. I was hoping for someone else but I trust Danny Ainge.` },
      { user: '@WasatchWarrior', text: `${prospect.name} + JJJ + Markkanen = CHAMPIONSHIP WINDOW OPEN 🏆` },
      { user: '@JazzBear_SLC', text: `Not sure about this one... hope I'm wrong tho 😬` },
      { user: '@NoteNation801', text: `Welcome to Utah, ${prospect.name.split(' ').pop()}!!! The Delta Center is ROCKING! 💜` }
    ];
    setFanReactions(reactions);
    setTimeout(() => setShowConfetti(false), 3000);
  };

  return (
    <div className="max-w-4xl mx-auto">
      {simState === 'idle' && (
        <div className="text-center">
          <p className="text-gray-400 text-sm mb-4">Lottery odds determine pick order. Results change every run.</p>
          <button onClick={startSim} className="px-8 py-4 rounded-2xl bg-jazz-sky text-black font-bold text-lg hover:opacity-90 transition-all pulse-sky">
            Run Mock Draft
          </button>
        </div>
      )}

      {simState === 'lottery' && (
        <div className="glass rounded-2xl p-6 animate-fade-in">
          <h3 className="text-lg font-bold text-jazz-sky text-center mb-4">Lottery Results</h3>
          <p className="text-center text-gray-400 text-sm mb-4">The ping pong balls have spoken...</p>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {lotteryOrder.slice(0, 14).map((t, i) => (
              <div key={i} className={`rounded-lg p-2 text-center text-sm ${t.team === 'UTAH JAZZ' ? 'bg-jazz-sky/20 border border-jazz-sky/50' : 'glass'}`}>
                <div className="font-black text-jazz-sky">#{i + 1}</div>
                <div className={`text-xs font-semibold ${t.team === 'UTAH JAZZ' ? 'text-jazz-sky' : 'text-gray-300'}`}>{t.team}</div>
              </div>
            ))}
          </div>
          <div className="text-center mt-4">
            <div className="text-jazz-sky font-bold">Jazz pick at #{lotteryOrder.findIndex(t => t.team === 'UTAH JAZZ') + 1}</div>
            <div className="text-gray-500 text-xs animate-pulse mt-2">Simulating picks...</div>
          </div>
        </div>
      )}

      {(simState === 'simulating' || simState === 'picking' || simState === 'done') && (
        <div className="glass rounded-2xl p-6">
          {/* Lottery result summary */}
          <div className="flex items-center justify-between mb-4 pb-3 border-b border-jazz-purple/30">
            <span className="text-xs text-gray-500">Jazz lottery position: <span className="text-jazz-sky font-bold">#{jazzPickNum}</span></span>
            <span className="text-xs text-gray-600">{jazzPickNum <= 4 ? 'Lottery winner!' : jazzPickNum <= 7 ? 'Solid range' : 'Fell in the draft'}</span>
          </div>

          {/* Previous picks */}
          <div className="space-y-2 mb-6">
            {picks.map((p, i) => (
              <div key={i} className="flex items-center gap-3 glass rounded-lg p-2.5 animate-fade-in">
                <div className="w-7 h-7 rounded-full bg-gray-700 flex items-center justify-center text-xs font-bold">#{p.pick}</div>
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-xs truncate">{p.team}</div>
                </div>
                <div className="text-right">
                  <div className="font-bold text-jazz-sky text-xs">{p.player.name}</div>
                  <div className="text-[10px] text-gray-500">{p.player.pos} | {p.player.school}</div>
                </div>
              </div>
            ))}
          </div>

          {simState === 'simulating' && (
            <div className="text-center py-6">
              <div className="text-jazz-sky font-bold animate-pulse">Picks {picks.length + 1}–{jazzPickNum - 1} loading...</div>
            </div>
          )}

          {simState === 'picking' && (
            <div className="animate-fade-in">
              <div className="text-center mb-4">
                <div className="text-jazz-sky font-black text-xl">WITH THE #{jazzPickNum} PICK...</div>
                <div className="text-gray-400 text-sm">The Utah Jazz select:</div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {jazzOptions.map(p => (
                  <button key={p.rank} onClick={() => makeJazzPick(p)}
                    className="glass rounded-xl p-4 text-center hover:border-jazz-sky/50 hover:scale-105 transition-all">
                    <div className="text-2xl font-black text-jazz-sky mb-1">#{p.rank}</div>
                    <div className="font-bold text-sm">{p.name}</div>
                    <div className="text-xs text-gray-400">{p.pos} | {p.school}</div>
                    <div className="text-xs text-gray-400 mt-1">{p.stats.ppg} PPG | {p.stats.rpg} RPG</div>
                    <div className={`text-xs font-bold mt-2 ${p.jazzFit >= 8 ? 'text-green-400' : 'text-yellow-400'}`}>Fit: {p.jazzFit}/10</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {simState === 'done' && userPick && (
            <div className="animate-fade-in">
              {showConfetti && (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                  {Array.from({length: 40}, (_, i) => (
                    <div key={i} className="absolute" style={{
                      left: `${Math.random() * 100}%`, top: '-20px',
                      width: 10, height: 10, borderRadius: Math.random() > 0.5 ? '50%' : '0',
                      background: ['#79A3DC', '#4E008E', '#A8C4E8', '#fff'][Math.floor(Math.random() * 4)],
                      animation: `confetti ${1 + Math.random() * 2}s ${Math.random()}s forwards`
                    }} />
                  ))}
                </div>
              )}

              <div className="glass rounded-xl p-3 mb-4 flex items-center gap-4">
                <div className="w-8 h-8 rounded-full bg-jazz-sky flex items-center justify-center text-black text-sm font-bold">#{jazzPickNum}</div>
                <div className="flex-1">
                  <div className="font-bold text-sm text-jazz-sky">UTAH JAZZ</div>
                  <div className="text-xs text-gray-400">select</div>
                </div>
                <div className="text-right">
                  <div className="font-bold text-jazz-sky text-lg">{userPick.name}</div>
                  <div className="text-xs text-gray-400">{userPick.pos} | {userPick.school}</div>
                </div>
              </div>

              <div className="glass rounded-xl p-4 mb-4">
                <h3 className="text-sm font-bold text-jazz-sky mb-2">Why {userPick.name.split(' ').pop()} Fits</h3>
                <p className="text-sm text-gray-300 leading-relaxed">{userPick.jazzFitAnalysis}</p>
              </div>

              <div className="glass rounded-xl p-4">
                <h3 className="text-sm font-bold text-jazz-sky mb-3">Fan Reactions</h3>
                <div className="space-y-3">
                  {fanReactions.map((r, i) => (
                    <div key={i} className="flex gap-3 animate-fade-in" style={{ animationDelay: `${i * 0.2}s` }}>
                      <div className="w-8 h-8 rounded-full bg-jazz-purple/50 flex items-center justify-center text-xs text-jazz-sky">{r.user[1].toUpperCase()}</div>
                      <div>
                        <div className="text-xs text-jazz-sky font-semibold">{r.user}</div>
                        <div className="text-sm text-gray-300">{r.text}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="text-center mt-6">
                <button onClick={startSim} className="px-6 py-2 rounded-full glass text-jazz-sky hover:bg-jazz-sky/20 text-sm font-semibold">
                  Run Again (New Lottery)
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// SECTION: AI CHAT SCOUT
// ============================================================
function AIChatScout() {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKey] = useState('');
  const chatRef = useRef(null);

  const systemPrompt = "You are the Utah Jazz's expert AI scout for the 2026-27 season. The Jazz's core is Keyonte George (#3, PG), Ace Bailey (#5, SG/SF, 2025 #5 pick), Lauri Markkanen (#23, SF/PF, All-Star), Jaren Jackson Jr. (#8, PF, 2x All-Star, 2023 DPOY, acquired from Memphis Feb 2026), and Walker Kessler (#24, C). JJJ was traded for Walter Clayton Jr., Kyle Anderson, Taylor Hendricks, Georges Niang, and 3 first-round picks. The 2026 draft's top prospects are Dybantsa, Peterson, and Boozer. Be confident, use analytics lingo, reference Utah's mountain identity. Keep answers concise (2-3 paragraphs max).";

  const sendMessage = async () => {
    if (!input.trim()) return;
    const userMsg = { role: 'user', content: input };
    const newMessages = [...messages, userMsg].slice(-12);
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);

    const key = apiKey || prompt('Enter your Anthropic API key:');
    if (key && !apiKey) setApiKey(key);

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt,
          messages: newMessages.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await resp.json();
      const assistantMsg = { role: 'assistant', content: data.content?.[0]?.text || 'I had trouble generating a response. Try again!' };
      setMessages(prev => [...prev, assistantMsg]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Enter a valid Anthropic API key to chat with the Jazz AI Scout.' }]);
    }
    setLoading(false);
  };

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  return (
    <>
      {/* Floating Button */}
      <button onClick={() => setOpen(!open)}
        className="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-jazz-sky text-black flex items-center justify-center text-xl font-bold shadow-lg pulse-sky hover:scale-110 transition-transform">
        {open ? '✕' : '🤖'}
      </button>

      {/* Chat Panel */}
      {open && (
        <div className="fixed bottom-24 right-6 z-40 w-96 max-w-[90vw] bg-jazz-midnight border border-jazz-purple rounded-2xl shadow-2xl animate-fade-in overflow-hidden">
          <div className="bg-jazz-purple/30 p-4 border-b border-jazz-purple">
            <h3 className="font-bold text-jazz-sky">Ask the Scout 🤖</h3>
            <p className="text-xs text-gray-400">AI-powered Jazz analysis</p>
          </div>

          <div ref={chatRef} className="h-80 overflow-y-auto p-4 space-y-3">
            {messages.length === 0 && (
              <div className="text-center text-gray-500 text-sm py-8">
                Ask about the roster, draft prospects, trades, or strategy!
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] rounded-xl px-3 py-2 text-sm ${m.role === 'user' ? 'bg-jazz-sky text-black' : 'glass text-gray-200'}`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="glass rounded-xl px-4 py-2 text-sm text-gray-400 animate-pulse">Scouting...</div>
              </div>
            )}
          </div>

          <div className="p-3 border-t border-jazz-purple flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendMessage()}
              placeholder="Ask about Jazz basketball..."
              className="flex-1 bg-gray-900/50 border border-jazz-purple rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-jazz-sky" />
            <button onClick={sendMessage} disabled={loading}
              className="px-4 py-2 rounded-lg bg-jazz-sky text-black font-bold text-sm hover:bg-yellow-400 disabled:opacity-40">
              Send
            </button>
          </div>
        </div>
      )}
    </>
  );
}
